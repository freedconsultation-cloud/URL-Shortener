services:
  - type: web
    name: url-shortener-freed
    runtime: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: BASE_URL
        value: https://url-shortener-freed.onrender.com
      - key: CLIENT_URL
        value: https://url-shortener-freed.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString

databases:
  - name: url-shortener-db
    plan: free
    databaseName: urlshortener
    user: urlshortener
